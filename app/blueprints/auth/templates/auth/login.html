{% extends "base.html" %}

{% block title %}Login – BundesEcho{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-md-4">
    <h2 class="mb-4 text-center">Einloggen</h2>
    <form method="post">
      <div class="mb-3">
        <label for="username" class="form-label">Benutzername</label>
        <input type="text" name="username" id="username" class="form-control" required autofocus>
      </div>
      <div class="mb-3">
        <label for="password" class="form-label">Passwort</label>
        <input type="password" name="password" id="password" class="form-control" required>
      </div>
      <button type="submit" class="btn btn-outline-light mt-2 btn-bg w-100">Login</button>
    </form>
    <div class="mt-3 text-center">
      <a href="{{ url_for('auth.register') }}">Noch nicht registriert?</a>
    </div>
  </div>
</div>
{% endblock %}

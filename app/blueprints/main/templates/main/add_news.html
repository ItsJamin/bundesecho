{% extends "base.html" %}

{% block title %}BundesEcho - Add News{% endblock %}

{% block content %}
    <h1 class="text-center mb-4">Neuigkeit hinzufügen</h1>
    <form method="POST" action="{{ url_for('main.add_news') }}">
        <div class="form-group">
            <label for="title">Titel</label>
            <input type="text" class="form-control" id="title" name="title" required>
        </div>
        <div class="form-group">
            <label for="content">Inhalt</label>
            <textarea class="form-control" id="content" name="content" rows="5" required></textarea>
        </div>
        <button type="submit" class="btn btn-primary">Neuigkeit hinzufügen</button>
    </form>
{% endblock %}

<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zitat von {{ person.name }}</title>
    <!-- Bootstrap 5 CSS (via CDN) -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">

    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden; /* Prevent scrollbars */
            background-color: transparent !important; /* Make body background transparent */
        }
        body {
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .quote-box {
            border: 1px solid #2e3b4e; /* Directly use dark mode border color */
            border-radius: 8px;
            padding: 20px;
            max-width: 600px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.2); /* Dark mode shadow */
            margin: 10px; /* Add some margin to prevent it from touching the iframe edges */
        }
        .quote-action-btns {
            display: none !important; /* Hide action buttons in embed mode */
        }
    </style>
</head>
<body>
    {% include "quote_box.html" %}
    <script>
        window.addEventListener('load', function() {
            const quoteBox = document.querySelector('.quote-box');
            if (quoteBox) {
                const height = quoteBox.scrollHeight + 20;
                // Send the height to the parent window
                window.parent.postMessage({
                    frameHeight: height,
                    frameUrl: window.location.href
                }, '*');
            }
        });
    </script>
</body>
</html>

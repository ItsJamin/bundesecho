{% extends "base.html" %}
{% block title %}Zitat-Einreichung{% endblock %}

{% block content %}
<div class="container my-4">
  <h2>Reiche ein Zitat ein</h2>

  {% if errors %}
    <div class="alert alert-danger">
      <ul>
      {% for error in errors %}
        <li>{{ error }}</li>
      {% endfor %}
      </ul>
    </div>
  {% endif %}

  <form method="post" action="{{ url_for('quote.submit_request') }}">
    <div class="mb-3">
      <textarea id="text" name="text" rows="4" class="form-control" maxlength="1000"
        placeholder="Hier dein Zitat, Person und Quelle und wenn bekannt auch das Datum der Aussage eingeben...">{{ form_data.text if form_data else '' }}</textarea>
    </div>

    <!-- Button row: submit left, advanced link right -->
    <div class="d-flex justify-content-between align-items-center mt-3">
      <button type="submit" class="btn btn-bg btn-outline-light">Einreichen</button>
      <a href="{{ url_for('quote.submit_quote') }}" class="btn btn-link text-decoration-none text-muted">Erweitertes Einreichen (nur mit Login)</a>
    </div>
  </form>
</div>
{% endblock %}
